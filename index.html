<!DOCTYPE html>
<!--
  HackerHero - Red Team Operations Manager
  A local-first, offline web application for pentesters and red team operators.
  All data is stored in the browser's IndexedDB — no server, no internet required.
  
  To run: serve this folder with any HTTP server, e.g.:
    python3 -m http.server 8080
  Then open: http://localhost:8080
-->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackerHero</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=logo5" />

  <link rel="stylesheet" href="css/app.css?v=20260407j">
</head>

       MATRIX RAIN CANVAS (visible only in "matrix" theme)
       ===================================================== -->

  <!-- =====================================================
       APP SHELL
       ===================================================== -->

    <!-- ── HEADER ── -->

      <div class="header-logo" id="btn-go-home" title="Back to Missions">
        <img src="favicon.svg?v=logo5" alt="HackerHero" class="logo-img" />
        <span class="logo-text">HackerHero</span>
      </div>

      <!-- Operation theme: tactical alert banner -->
      <div id="op-alert-banner" class="hidden">
        <span class="op-alert-dot"></span>
        <span class="op-alert-label">ONGOING OPERATION</span>
        <span class="op-alert-sub">DO NOT DISTURB</span>
        <span class="op-alert-dot"></span>
      </div>

      <div id="active-mission-badge" class="mission-badge hidden">
        <span class="badge-label">OPERATION</span>
        <span id="active-mission-name" class="badge-name" title="Click to rename"></span>
        <div id="mission-tz-clock" class="mission-tz-clock hidden">
          <span id="tz-time" class="tz-time">--:--:--</span>
          <span id="tz-date" class="tz-date">---</span>
          <span id="tz-zone" class="tz-zone"></span>
        </div>
      </div>

      <div class="header-right">
        <!-- Operator name indicator -->
        <div class="operator-chip" id="operator-chip" title="Click to change operator name">
          <span class="operator-icon">&#9670;</span>
          <span id="header-operator-name">Loading…</span>
          <span class="operator-edit-hint">&#9998;</span>
        </div>

          <label for="theme-select" class="sr-only">Theme</label>

            <option value="dark">&#11044; Dark</option>
            <option value="light">&#9675; Light</option>
            <option value="concentration">&#9670; Focus</option>
            <option value="matrix">&#9707; Matrix</option>
            <option value="upside-down">&#9763; Upside Down</option>
            <option value="operation">&#9760; Operation</option>
            <option value="wargames">&#9000; WarGames</option>
            <option value="hackers">&#9889; Hack The Planet</option>
          </select>
        </div>

        <!-- Docs link -->
        <button class="btn-icon" id="btn-open-docs" title="Documentation">&#9432;</button>
      </div>
    </header>

          <!-- Dynamically rendered by js/app.js – MissionsPanel.render() -->

        <!-- OVERVIEW PANEL -->

          <!-- Dynamically rendered by OverviewPanel.render() -->

  <!-- =====================================================
       MODAL OVERLAY
       ===================================================== -->

        <button id="modal-close" title="Close">&times;</button>

      <div id="modal-body">
        <!-- Populated dynamically -->
      </div>
      <div id="modal-footer">
        <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <!-- =====================================================
       TOAST NOTIFICATIONS
       ===================================================== -->

  <!-- =====================================================
       TOOLTIP (global, positioned by JS)
       ===================================================== -->

  <!-- =====================================================
       LIGHTBOX (image gallery overlay)
       ===================================================== -->
  <div id="lightbox-overlay" class="hidden" aria-label="Image viewer">
    <button class="lightbox-close" title="Close (Esc)">&times;</button>
    <button class="lightbox-nav prev" title="Previous (←)">‹</button>
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="Attachment preview" />
    </div>
    <button class="lightbox-nav next" title="Next (→)">›</button>
    <div class="lightbox-info">
      <span class="lightbox-counter" id="lightbox-counter"></span>
      <span class="lightbox-filename" id="lightbox-filename"></span>
    </div>

  <!-- =====================================================
       ENTRY POINT – ES6 Module

       ===================================================== -->
